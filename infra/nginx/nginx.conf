# =============================================================================
# KMS Nginx Reverse Proxy — Production
# =============================================================================
#
# Path routing (all services behind a single domain):
#
#   /api/v1/chat*   →  rag-service:8002  (SSE streaming)
#   /api/v1/runs*   →  rag-service:8002
#   /api/v1/agents* →  rag-service:8002
#   /api/v1/*       →  kms-api:8000      (main REST API)
#   /*              →  web-ui:3000       (Next.js frontend)
#
# search-api (port 8001) is internal-only — kms-api calls it directly via
# Docker network; it is NOT exposed through this reverse proxy.
#
# Usage:
#   Replace YOUR_DOMAIN with your actual domain before deploying.
#   SSL certificates are managed by Certbot / Let's Encrypt.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/vnd.ms-fontobject application/x-font-ttf
               font/opentype image/svg+xml image/x-icon;

    # Security headers (applied globally)
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upstream definitions
    upstream kms_api {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    upstream rag_service {
        server 127.0.0.1:8002;
        keepalive 16;
    }

    upstream web_ui {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # ─── HTTP → HTTPS redirect ──────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name YOUR_DOMAIN;

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS — main virtual host ──────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name YOUR_DOMAIN;

        # SSL — managed by Certbot
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;

        # Modern SSL settings (Mozilla Intermediate profile)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;

        # HSTS (6 months) — only enable after confirming SSL is stable
        # add_header Strict-Transport-Security "max-age=15768000" always;

        # Upload / request size limits
        client_max_body_size 100M;
        client_body_buffer_size 128k;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Common proxy headers passed to all upstreams
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # ── RAG Service — SSE streaming (chat / runs / agents) ──────────────
        # Must come BEFORE the /api/v1/ prefix block so regex wins.
        location ~ ^/api/v1/(chat|runs|agents) {
            proxy_pass http://rag_service;

            # SSE / streaming — disable buffering
            proxy_buffering off;
            proxy_cache     off;
            proxy_read_timeout 300s;
            chunked_transfer_encoding on;

            # WebSocket upgrade support (if needed in future)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── KMS API — main REST API ─────────────────────────────────────────
        location /api/v1/ {
            proxy_pass http://kms_api;

            # Allow large file uploads (overrides global for this block)
            client_max_body_size 100M;

            # Rate limiting — see limit_req_zone below for config
            # limit_req zone=api burst=20 nodelay;
        }

        # ── KMS API health (used by load balancers) ─────────────────────────
        location = /api/v1/health/live {
            proxy_pass http://kms_api;
            access_log off;
        }

        # ── Next.js static assets ───────────────────────────────────────────
        location /_next/static/ {
            proxy_pass http://web_ui;
            proxy_cache_valid 200 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        location /_next/ {
            proxy_pass http://web_ui;
        }

        # ── Frontend — catch-all ────────────────────────────────────────────
        location / {
            proxy_pass http://web_ui;

            # Required for Next.js App Router — preserve host header
            proxy_set_header Host $host;
        }
    }
}
