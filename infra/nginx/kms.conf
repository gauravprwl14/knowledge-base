# =============================================================================
# KMS Nginx Virtual Host — Production
# =============================================================================
#
# Install:
#   sudo cp infra/nginx/kms.conf /etc/nginx/sites-available/kms
#   sudo sed -i 's/YOUR_DOMAIN/kms.example.com/g' /etc/nginx/sites-available/kms
#   sudo ln -s /etc/nginx/sites-available/kms /etc/nginx/sites-enabled/kms
#   sudo nginx -t && sudo systemctl reload nginx
#
# Path routing:
#   /api/v1/chat|runs|agents  →  rag-service:8002  (SSE streaming)
#   /api/v1/*                 →  kms-api:8000       (main REST API)
#   /_next/static/*           →  web-ui:3000        (immutable cache)
#   /*                        →  web-ui:3000        (Next.js frontend)
#
# search-api (port 8001) is internal-only — NOT routed through Nginx.
# =============================================================================

# ─── Upstream definitions ─────────────────────────────────────────────────────

upstream kms_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream rag_service {
    server 127.0.0.1:8002;
    keepalive 16;
}

upstream web_ui {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Allow Let's Encrypt ACME challenge (Certbot writes here)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS — main virtual host ────────────────────────────────────────────────

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    # SSL — managed by Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;

    # Mozilla Intermediate SSL profile
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS — enable only after SSL is confirmed stable (6 months)
    # add_header Strict-Transport-Security "max-age=15768000" always;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request limits
    client_max_body_size 100M;
    client_body_buffer_size 128k;

    # Timeouts
    proxy_connect_timeout 30s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Common proxy headers for all location blocks
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # ── RAG Service — SSE streaming (chat / runs / agents) ────────────────────
    # Regex location takes priority over the /api/v1/ prefix blocks below.
    # Handles both bare /api/v1/ and basePath-prefixed /kms/api/v1/ variants.
    location ~ ^(/kms)?/api/v1/(chat|runs|agents) {
        proxy_pass http://rag_service;

        # SSE requires buffering disabled
        proxy_buffering off;
        proxy_cache     off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;

        # WebSocket upgrade (future-proof)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── KMS API — basePath-prefixed routes (/kms/api/v1/) ────────────────────
    # The Next.js frontend is deployed with basePath=/kms. The Google OAuth
    # flow and other direct API calls arrive as /kms/api/v1/... Browser-level
    # OAuth redirects (302 to Google and back) cannot go through Next.js
    # server-side rewrites, so nginx must route them directly to kms-api.
    location /kms/api/v1/ {
        # Strip the /kms prefix before forwarding to kms-api.
        # kms-api listens at /api/v1/, not /kms/api/v1/.
        rewrite ^/kms(/api/v1/.*)$ $1 break;
        proxy_pass http://kms_api;
    }

    # ── KMS API — main REST API (bare /api/v1/) ───────────────────────────────
    location /api/v1/ {
        proxy_pass http://kms_api;
    }

    # ── KMS API health (for load balancer checks — suppress access log) ────────
    location = /api/v1/health/live {
        proxy_pass http://kms_api;
        access_log off;
    }

    location = /kms/api/v1/health/live {
        rewrite ^/kms(/api/v1/health/live)$ $1 break;
        proxy_pass http://kms_api;
        access_log off;
    }

    # ── Next.js immutable static assets ───────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://web_ui;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /_next/ {
        proxy_pass http://web_ui;
    }

    # ── Frontend — catch-all ──────────────────────────────────────────────────
    location / {
        proxy_pass http://web_ui;
    }
}
