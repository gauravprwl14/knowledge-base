# Grafana Mimir — single-process mode for local development
# Replaces Prometheus. Accepts OTLP push from OTel Collector.
# Query endpoint: http://mimir:9009/prometheus (Prometheus-compatible)

target: all

# ── HTTP server ────────────────────────────────────────────────────────────
server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: warn

# ── Common storage (filesystem for local dev) ─────────────────────────────
common:
  storage:
    backend: filesystem
    filesystem:
      dir: /data/mimir

# ── Blocks storage ────────────────────────────────────────────────────────
blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/blocks
  tsdb:
    dir: /data/mimir/tsdb

# ── Compactor ─────────────────────────────────────────────────────────────
compactor:
  data_dir: /data/mimir/compactor

# ── Distributor: accept OTLP and Prometheus remote_write ──────────────────
distributor:
  ring:
    instance_addr: 127.0.0.1

# ── Ingester ──────────────────────────────────────────────────────────────
ingester:
  ring:
    instance_addr: 127.0.0.1
    replication_factor: 1

# ── Ruler (alerting, optional) ────────────────────────────────────────────
ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/rules

# ── Limits ────────────────────────────────────────────────────────────────
limits:
  # Allow OTLP ingestion (native histogram support)
  native_histograms_ingestion_enabled: true
  # Reject samples older than 1 week
  max_global_series_per_user: 150000

# ── Multi-tenancy disabled for local dev ──────────────────────────────────
multitenancy_enabled: false
