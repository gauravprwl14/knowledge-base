receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  resourcedetection:
    detectors: [env, docker]
    timeout: 5s

exporters:
  # Traces → Grafana Tempo (already wired)
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Logs → Grafana Loki (already wired)
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # Metrics → Grafana Mimir via OTLP HTTP push (replaces prometheus pull)
  otlphttp/mimir:
    endpoint: http://mimir:9009/otlp
    tls:
      insecure: true
    headers:
      X-Scope-OrgID: "kms"   # required even with multitenancy disabled

  debug:
    verbosity: normal
    sampling_initial: 5
    sampling_thereafter: 200

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/mimir]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/loki, debug]
