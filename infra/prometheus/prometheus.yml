global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: kms

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8889]

  - job_name: kms-api
    static_configs:
      - targets: [kms-api:8000]
    metrics_path: /metrics

  - job_name: search-api
    static_configs:
      - targets: [search-api:8001]
    metrics_path: /metrics

  - job_name: tempo
    static_configs:
      - targets: [tempo:3200]
    metrics_path: /metrics

  - job_name: loki
    static_configs:
      - targets: [loki:3100]
    metrics_path: /metrics

  - job_name: rabbitmq
    static_configs:
      - targets: [rabbitmq:15692]
    metrics_path: /metrics
