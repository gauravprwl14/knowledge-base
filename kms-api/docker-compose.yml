# =============================================================================
# KMS API Docker Compose - Development
# =============================================================================
# Usage:
#   docker-compose up -d        # Start all services
#   docker-compose logs -f api  # View API logs
#   docker-compose down         # Stop all services
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # KMS API Service
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: kms-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - NODE_ENV=development
      - APP_NAME=kms-api
      - APP_PORT=8000
      - APP_HOST=0.0.0.0
      - API_PREFIX=api
      - API_VERSION=v1
      - LOG_LEVEL=debug
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/kms_dev?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - QUEUE_HOST=rabbitmq
      - QUEUE_PORT=5672
      - QUEUE_USER=guest
      - QUEUE_PASSWORD=guest
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-dev-jwt-access-secret-min-32-characters}
      - JWT_ACCESS_EXPIRATION=15m
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-jwt-refresh-secret-min-32-characters}
      - JWT_REFRESH_EXPIRATION=7d
      - API_KEY_ENCRYPTION_SECRET=${API_KEY_ENCRYPTION_SECRET:-dev-api-key-encryption-32chars}
      - OTEL_ENABLED=true
      - OTEL_SERVICE_NAME=kms-api
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - THROTTLE_TTL=60
      - THROTTLE_LIMIT=100
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - .:/app:ro
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kms-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: kms-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=kms_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kms_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: kms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kms-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # RabbitMQ Message Queue
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: kms-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - kms-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  kms-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
